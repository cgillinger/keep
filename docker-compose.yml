version: '3.8'

services:
  keep-clone:
    build: .
    container_name: keep-clone
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - keep-network

networks:
  keep-network:
    driver: bridge
