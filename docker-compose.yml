version: '3.8'

services:
  keep-clone:
    build: .
    container_name: keep-clone
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Set FORCE_HTTPS=true in .env if running behind HTTPS reverse proxy
      # Leave unset or false for HTTP-only deployments
    networks:
      - keep-network

networks:
  keep-network:
    driver: bridge
